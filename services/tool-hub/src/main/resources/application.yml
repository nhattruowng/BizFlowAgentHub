server:
  port: 8083

spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/bizflow
    username: bizflow
    password: bizflow
    pool:
      enabled: true
      initial-size: 5
      max-size: 30
      max-idle-time: 30m
      validation-query: SELECT 1

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"

approval:
  service:
    url: ${APPROVAL_SERVICE_URL:http://localhost:8084}

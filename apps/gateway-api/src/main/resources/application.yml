server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bizflow
    username: bizflow
    password: bizflow
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"

workflow:
  engine:
    url: http://localhost:8082
